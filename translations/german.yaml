# Hilfetext
help_text: |
  • Scrollen zum Zoomen
  • Mittlere Maustaste zum Verschieben der Ansicht
  • Rechte Maustaste zum Erzeugen eines Körpers
  • Um die Masse des Körpers zu ändern, bewegen Sie die Maus kreisförmig um ihn, während Sie die rechte Maustaste gedrückt halten
  • Leertaste zum Pausieren/Fortsetzen
  • E öffnet ein Menü, in dem Sie die Quadtree-Visualisierung aktivieren können
